	api libs.annotationApi
	api libs.jdom2
	api libs.quartz
	api libs.jsonrpc4j
	api libs.jaxbApi
	runtimeOnly libs.jwsApi
	api libs.hibernateCore
	api libs.hypersistenceUtils
	api libs.persistenceApi
	api libs.commonsIo
	api libs.resilience4jRetry
	api libs.baseModelMigrationApi
