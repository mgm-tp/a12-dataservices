	testImplementation libs.jsonassert
	testImplementation libs.xmlunitCore
	testImplementation libs.xmlunitMatchers
	testImplementation libs.xmlunitAssertj
}


tasks.register('versionProperties', WriteProperties) {
	description = 'Write project version properties to the file.'
	destinationFile.value project.layout.buildDirectory.file('services-version.properties')
	encoding = 'UTF-8'
	comment = ' Version and name of the project'
	property('project.version', project.version)
	property('project.groupId', project.group)
	property('project.artifactId', project.name)
	property('groupId', project.group)
	property('artifactId', project.name)
	property('a12DataservicesVersion', project.version)
	property('a12ClassicVersion', project.version)
}

processResources {
	from(tasks.versionProperties)
	duplicatesStrategy = DuplicatesStrategy.INCLUDE
}

description = 'Core business logic and domain services for Data Services'
