plugins {
	id 'com.mgmtp.a12.dataservices.java-conventions'
}

dependencies {
	api project(":content-store:dataservices-content-store-domain")
	api libs.baseModelUtils
	api libs.jaxbApi
	api libs.springBootAutoconfigure
	api libs.springBootConfigurationProcessor
	api libs.annotationApi
	api libs.restServerConnectorSpringBootAutoconfigure
	api libs.uaaRestClientSpringBootAutoconfigure
	implementation libs.uaaRestClient
	implementation libs.mgmModelApi
	implementation libs.modelMarshalling
	implementation libs.jacksonDatabind
	implementation libs.springCore
	implementation libs.springContext
	implementation libs.springWeb
	implementation libs.slf4jJul
	implementation libs.slf4jApi
	implementation libs.commonsLang3
	implementation libs.commonsCollections4

	implementation libs.springBootStarterRestClient

	testImplementation libs.springBootStarterWeb
	testImplementation libs.springTest
	testImplementation libs.springBootTest
	testImplementation libs.springBootStarterSecurity
	testImplementation libs.springSecurityTest
	testImplementation libs.testng
	testImplementation libs.festAssertCore
	testImplementation libs.assertjCore
	testImplementation libs.jsonassert
	testImplementation libs.xercesImpl
	testImplementation libs.json
	testImplementation libs.mgmModelApi
	testImplementation libs.mockitoCore
	testImplementation libs.mockServer
	// MockServer depends on commons-logging, Spring Boot 4 uses spring-jcl bridge
	testRuntimeOnly libs.slf4jJcl

}

description = 'Spring Boot AutoConfiguration for Content Store REST client'
