plugins {
	id 'com.mgmtp.a12.dataservices.java-conventions'
}

dependencies {
	api project(':content-store:dataservices-content-store-core')
	api project(':dataservices-common:dataservices-common-lib')
	api libs.springBootAutoconfigure
	api libs.springBootConfigurationProcessor
	api libs.springBootStarterDataJpa
	// TODO A12S-5284: Remove spring-web from all not web artifacts
	api libs.springBootStarterWeb
	api libs.liquibaseCore
	api libs.embeddedPostgres
	api platform(libs.embeddedPostgresServer)
	compileOnly libs.servletApi
	runtimeOnly libs.springBootPropertiesMigrator
	implementation libs.hazelcast, libs.hazelcastSpring


	testImplementation libs.springTest
	testImplementation libs.springBootTest
	testImplementation libs.springBootStarterJdbc
	testImplementation libs.springBootStarterLogging
	testImplementation libs.testng
	testImplementation libs.annotations
	testImplementation libs.annotationApi
	testImplementation libs.jsonassert
	testImplementation libs.mockitoCore
}

configurations {
	testClasses {
		extendsFrom(testRuntimeOnly)
	}
}

task testJar(type: Jar) {
	archiveClassifier.set 'test'
	from sourceSets.test.output
}

// add the jar generated by the testJar task to the testClasses dependency
artifacts {
	testClasses testJar
}

test {
	systemProperty 'logging.level.com.mgmtp.a12.dataservices', 'DEBUG'
}

description = 'Spring Boot AutoConfiguration for Data Services Content Store'
