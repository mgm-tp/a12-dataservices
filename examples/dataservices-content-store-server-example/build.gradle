plugins {
	id 'com.mgmtp.a12.dataservices.spring-boot-conventions'
}

dependencies {
	api platform(project(':content-store'))
	implementation project(':content-store:dataservices-content-store-server-app')

//	In your external project, you should also specify Content Store BOM by specifying:
//      api platform("com.mgmtp.a12.dataservices.contentstore:content-store-parent:{VERSION}")
//	Then you can omit version for ContentStore artifacts like:
//		implementation 'com.mgmtp.a12.dataservices.contentstore:dataservices-content-store-server-app'
//
	testImplementation libs.springTest
	testImplementation libs.testng
	testImplementation libs.mockitoCore
}

springBoot {
	mainClass.set 'com.mgmtp.a12.examples.contentstore.ContentStoreServerExampleApplication'
}

bootRun {
	systemProperties 'workDir': "${project.rootDir}/"
}

tasks.named('bootJar') {
	dependsOn ':content-store:dataservices-content-store-server-app:bootJar'
}

description = 'Content Store Server Example - Demonstrates usage of the content store server and its extension points'
