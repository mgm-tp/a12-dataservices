spring.jta.enabled=true
spring.datasources.dataservices.jpa.show-sql=false
spring.datasources.dataservices.jpa.properties.hibernate.ddl-auto=validate
spring.datasources.dataservices.jpa.properties.hibernate.physical_naming_strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
spring.datasources.dataservices.jpa.properties.hibernate.implicit_naming_strategy=org.springframework.boot.hibernate.SpringImplicitNamingStrategy
spring.jpa.open-in-view=false

# Hibernate batching configuration for improved INSERT/UPDATE performance
spring.datasources.dataservices.jpa.properties.hibernate.jdbc.batch_size=50
spring.datasources.dataservices.jpa.properties.hibernate.order_inserts=true
spring.datasources.dataservices.jpa.properties.hibernate.order_updates=true
